name: Swarm UX Test
on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]
jobs:
  swarm:
    # Runs on PR events, or when a repo writer (owner/member/collaborator) comments
    # `/swarm run` on the PR — drive-by commenters can't trigger billable runs.
    # With the GitHub App, whether PR events actually run a test is governed by the
    # repo's run-mode (Swarm → Integrations): "automatic" runs on every PR open,
    # "manual" only runs on a `/swarm run` comment. `/swarm run` always runs.
    if: github.event_name == 'pull_request' || (github.event.issue.pull_request && contains(github.event.comment.body, '/swarm run') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    # Job-level on purpose: bot comments (e.g. the Swarm bot's onboarding comment)
    # fire issue_comment runs that the `if:` gate skips — a workflow-level group
    # would cancel the in-flight PR run BEFORE the gate evaluates, leaving a
    # spurious red "cancelled" check. Job-level concurrency only takes effect when
    # the job actually runs, so new pushes / repeated `/swarm run` still cancel
    # stale in-flight runs while gate-skipped runs cancel nothing.
    concurrency:
      group: swarm-pr-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
      id-token: write   # for the Swarm GitHub App (OIDC) auth path; harmless if using apiKey
    steps:
      - uses: actions/checkout@v4
        with:
          # On a `/swarm run` comment the default checkout is the base branch; pin to the PR head.
          ref: ${{ github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}
      - uses: AyushSagar16/swarm-action@v1
        with:
          # Omit `apiKey` when the Swarm GitHub App is installed — the Action
          # authenticates via OIDC and pulls the personas/task you set up with `/swarm`.
          apiKey: ${{ secrets.SWARM_API_KEY }}
        env:
          SWARM_TEST_USERNAME: ${{ secrets.SWARM_TEST_USERNAME }}
          SWARM_TEST_PASSWORD: ${{ secrets.SWARM_TEST_PASSWORD }}
